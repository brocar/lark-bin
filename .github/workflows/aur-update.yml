name: Update AUR Package

on:
  schedule:
    - cron: '0 4 * * *' # Check daily at 4am UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-aur:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    container: 
      image: archlinux:base-devel
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
    
      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm git openssh python

      - name: Check and Update PKGBUILD
        id: check
        run: |
          python update_ver.py

      - name: Generate .SRCINFO
        if: steps.check.outputs.updated == 'true'
        run: |
          # makepkg cannot run as root, so we create a builder user
          useradd builder -m
          chown -R builder:builder .
          
          # Generate SRCINFO using the builder user
          su builder -c "makepkg --printsrcinfo" > .SRCINFO

      - name: Commit and Push to GitHub
        if: steps.check.outputs.updated == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.check.outputs.version }}"
          
          # Tag the commit with the version
          git tag "v${{ steps.check.outputs.version }}"
          
          # Push to GitHub with tags
          git push --follow-tags
